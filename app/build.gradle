plugins {
    id 'com.android.application'
}

android {
    namespace "org.rowetel.freedv"
    compileSdk 34

    defaultConfig {
        applicationId "org.rowetel.freedv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src']
            res.srcDirs = ['res']
            jniLibs.srcDirs = ['libs']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
}
